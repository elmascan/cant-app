name: cant
description: CanT — Find Your Sports Crew
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_messaging: ^15.1.3
  google_fonts: ^6.1.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.3.2
  firebase_storage: ^12.3.4
  image_picker: ^1.1.2
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  http: ^1.2.0
  flutter_card_swiper: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: 'assets/icon/icon.png'
  adaptive_icon_background: '#2563EB'
  adaptive_icon_foreground: 'assets/icon/icon_fg.png'
  min_sdk_android: 21

flutter_native_splash:
  color: '#2563EB'
  image: 'assets/icon/splash_logo.png'
  color_dark: '#2563EB'
  image_dark: 'assets/icon/splash_logo.png'
  android_12:
    color: '#2563EB'
    image: 'assets/icon/splash_logo.png'
  fullscreen: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
